<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rhazedon POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .active-tab { color: #4f46e5; border-top: 3px solid #4f46e5; }
        .hide { display: none; }
        #reader__dashboard_section_csr button { background: #4f46e5 !important; color: white !important; border-radius: 8px !important; padding: 8px 16px !important; }
    </style>
</head>
<body class="bg-gray-50 pb-24">

    <header class="bg-indigo-700 text-white p-4 shadow-md sticky top-0 z-50">
        <h1 class="text-xl font-extrabold tracking-tight text-center">Rhazedon Sari-sari Store</h1>
        <div id="toast" class="fixed top-16 left-1/2 -translate-x-1/2 hidden bg-green-500 text-white text-xs px-4 py-2 rounded-full shadow-lg z-[100]">Success!</div>
    </header>

    <main class="max-w-md mx-auto p-4">
        
        <section id="tab-checkout" class="tab-section">
            <div class="bg-white rounded-2xl shadow-sm p-4 mb-4 border border-gray-100">
                <div id="reader" class="rounded-xl overflow-hidden bg-gray-100 mb-3"></div>
                <div class="flex gap-2">
                    <input type="text" id="manualInput" placeholder="Scan or Enter Barcode" class="flex-1 bg-gray-100 p-3 rounded-xl border-none text-sm outline-none">
                    <button onclick="addToCartByBarcode()" class="bg-indigo-600 text-white px-6 rounded-xl font-bold active:scale-95 transition text-sm">Add</button>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm p-4 border border-gray-100">
                <h2 class="text-gray-500 text-xs font-bold uppercase mb-3 tracking-wider">Customer Cart</h2>
                <div id="cartItems" class="space-y-4 mb-6 max-h-80 overflow-y-auto"></div>
                <div class="border-t pt-4">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-gray-500 font-semibold">Total:</span>
                        <span class="text-2xl font-black text-indigo-700">₱<span id="cartTotal">0.00</span></span>
                    </div>
                    <button onclick="processCheckout()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-extrabold text-lg shadow-lg active:scale-95 transition">COMPLETE SALE</button>
                </div>
            </div>
        </section>

        <section id="tab-inventory" class="tab-section hide">
            <div class="bg-indigo-50 p-4 rounded-2xl mb-6 border border-indigo-100">
                <h2 id="invFormTitle" class="font-bold text-indigo-800 mb-4">Add New Product</h2>
                <div class="space-y-3">
                    <input type="hidden" id="editId">
                    <div class="relative w-full h-24 bg-gray-200 rounded-xl overflow-hidden flex items-center justify-center border-2 border-dashed border-gray-300">
                        <input type="file" id="prodImg" accept="image/*" capture="environment" class="absolute inset-0 opacity-0 z-10" onchange="handleImage(this)">
                        <img id="prevImg" class="absolute inset-0 w-full h-full object-cover hidden">
                        <span class="text-xs font-bold text-gray-500">📸 ADD/CHANGE PHOTO</span>
                    </div>
                    <input type="text" id="pName" placeholder="Product Name" class="w-full p-3 rounded-xl border-none ring-1 ring-gray-200 text-sm">
                    <div class="flex gap-2">
                        <input type="number" id="pPrice" placeholder="Price" class="w-1/3 p-3 rounded-xl border-none ring-1 ring-gray-200 text-sm">
                        <input type="number" id="pQty" placeholder="Stock" class="w-1/3 p-3 rounded-xl border-none ring-1 ring-gray-200 text-sm">
                        <input type="text" id="pBarcode" placeholder="Barcode" class="w-1/3 p-3 rounded-xl border-none ring-1 ring-gray-200 text-sm">
                    </div>
                    <div class="flex gap-2">
                        <button onclick="addProduct()" class="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-bold shadow-md">Save Product</button>
                        <button onclick="resetForm()" class="bg-gray-300 text-gray-700 px-4 rounded-xl font-bold">Cancel</button>
                    </div>
                </div>
            </div>
            <div id="inventoryList" class="space-y-3"></div>
        </section>

        <section id="tab-reports" class="tab-section hide">
            <div class="bg-white rounded-2xl p-4 shadow-sm mb-4 border border-gray-100 flex justify-between items-center">
                <div>
                    <p class="text-gray-500 text-[10px] font-bold uppercase text-center">Daily Revenue</p>
                    <h3 class="text-2xl font-black text-indigo-700">₱<span id="repDailyRev">0</span></h3>
                </div>
                <input type="date" id="reportDate" onchange="renderReports()" class="bg-gray-100 rounded-lg p-2 text-xs border-none font-bold">
            </div>
            <div id="repTopItems" class="bg-white rounded-2xl p-4 shadow-sm mb-4 space-y-2"></div>
            <div id="repLogs" class="space-y-3 max-h-80 overflow-y-auto"></div>
            <button onclick="exportData()" class="w-full mt-4 bg-gray-200 text-gray-700 py-2 rounded-xl text-xs font-bold uppercase tracking-widest">Download CSV Backup</button>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around items-center h-20 px-4 z-50">
        <button onclick="switchTab('checkout')" class="nav-btn flex flex-col items-center gap-1 flex-1 active-tab">
            <span class="text-xl">🛒</span><span class="text-[10px] font-bold uppercase">POS</span>
        </button>
        <button onclick="switchTab('inventory')" class="nav-btn flex flex-col items-center gap-1 flex-1 text-gray-400">
            <span class="text-xl">📦</span><span class="text-[10px] font-bold uppercase">Stock</span>
        </button>
        <button onclick="switchTab('reports')" class="nav-btn flex flex-col items-center gap-1 flex-1 text-gray-400">
            <span class="text-xl">📊</span><span class="text-[10px] font-bold uppercase">Reports</span>
        </button>
    </nav>

    <script>
        let inventory = JSON.parse(localStorage.getItem('rhz_inv')) || [];
        let sales = JSON.parse(localStorage.getItem('rhz_sales')) || [];
        let cart = [];
        let currentImgBase64 = "";

        function switchTab(id) {
            document.querySelectorAll('.tab-section').forEach(s => s.classList.add('hide'));
            document.getElementById('tab-' + id).classList.remove('hide');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-tab', 'text-indigo-600'));
            event.currentTarget.classList.add('active-tab');
            if(id === 'inventory') renderInventory();
            if(id === 'reports') renderReports();
        }

        function handleImage(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const max = 200;
                    const scale = max / img.width;
                    canvas.width = max; canvas.height = img.height * scale;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    currentImgBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById('prevImg').src = currentImgBase64;
                    document.getElementById('prevImg').classList.remove('hide');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function addProduct() {
            const name = document.getElementById('pName').value, 
                  price = parseFloat(document.getElementById('pPrice').value), 
                  qty = parseInt(document.getElementById('pQty').value) || 0, 
                  barcode = document.getElementById('pBarcode').value,
                  editId = document.getElementById('editId').value;

            if(!name || isNaN(price) || !barcode) return showToast("Check fields!", true);

            if(editId) {
                const index = inventory.findIndex(p => p.id == editId);
                inventory[index] = { ...inventory[index], name, price, qty, barcode, img: currentImgBase64 || inventory[index].img };
                showToast("Product Updated");
            } else {
                inventory.push({ id: Date.now(), name, price, qty, barcode, img: currentImgBase64 });
                showToast("Product Added");
            }

            localStorage.setItem('rhz_inv', JSON.stringify(inventory));
            resetForm(); renderInventory();
        }

        function resetForm() {
            ['pName', 'pPrice', 'pQty', 'pBarcode', 'editId'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('prevImg').classList.add('hide');
            document.getElementById('invFormTitle').innerText = "Add New Product";
            currentImgBase64 = "";
        }

        function editProduct(id) {
            const p = inventory.find(item => item.id === id);
            if(!p) return;
            document.getElementById('pName').value = p.name;
            document.getElementById('pPrice').value = p.price;
            document.getElementById('pQty').value = p.qty;
            document.getElementById('pBarcode').value = p.barcode;
            document.getElementById('editId').value = p.id;
            document.getElementById('invFormTitle').innerText = "Editing: " + p.name;
            if(p.img) {
                document.getElementById('prevImg').src = p.img;
                document.getElementById('prevImg').classList.remove('hide');
            }
            window.scrollTo(0,0);
        }

        function renderInventory() {
            const list = document.getElementById('inventoryList');
            list.innerHTML = inventory.map(p => `
                <div class="bg-white p-3 rounded-xl flex items-center justify-between shadow-sm border border-gray-100">
                    <div class="flex items-center gap-3">
                        <img src="${p.img || 'https://via.placeholder.com/50'}" class="w-10 h-10 rounded-lg object-cover bg-gray-50">
                        <div>
                            <p class="font-bold text-sm leading-none">${p.name}</p>
                            <p class="text-indigo-600 font-bold text-xs">₱${p.price.toFixed(2)}</p>
                            <p class="text-[9px] text-gray-400 font-bold">BC: ${p.barcode}</p>
                        </div>
                    </div>
                    <div class="flex flex-col gap-1 items-end">
                        <p class="text-[10px] font-bold ${p.qty <= 5 ? 'text-red-500' : 'text-gray-400'} uppercase">Stock: ${p.qty}</p>
                        <div class="flex gap-2">
                            <button onclick="editProduct(${p.id})" class="text-indigo-600 text-xs font-bold uppercase">Edit</button>
                            <button onclick="deleteProd(${p.id})" class="text-red-500 text-xs uppercase font-bold">Delete</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function deleteProd(id) { if(confirm("Delete Product?")) { inventory = inventory.filter(p => p.id !== id); localStorage.setItem('rhz_inv', JSON.stringify(inventory)); renderInventory(); } }

        function addToCartByBarcode() {
            const bc = document.getElementById('manualInput').value;
            const item = inventory.find(p => p.barcode === bc);
            if(item) {
                if(item.qty <= 0) return showToast("Out of Stock!", true);
                const cartIndex = cart.findIndex(i => i.barcode === bc);
                if(cartIndex > -1) {
                    if(cart[cartIndex].buyQty < item.qty) cart[cartIndex].buyQty++;
                    else return showToast("No more stock available", true);
                } else {
                    cart.push({...item, buyQty: 1});
                }
                updateCartUI();
                document.getElementById('manualInput').value = "";
                showToast("Added to Cart");
            } else showToast("Product not found!", true);
        }

        function updateCartUI() {
            const container = document.getElementById('cartItems');
            let total = 0;
            container.innerHTML = cart.map((item, idx) => {
                const subtotal = item.price * item.buyQty;
                total += subtotal;
                return `
                <div class="bg-gray-50 p-3 rounded-xl flex justify-between items-center">
                    <div class="w-1/2">
                        <p class="font-bold text-sm truncate">${item.name}</p>
                        <p class="text-xs text-gray-500 font-bold">₱${item.price.toFixed(2)}</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="flex items-center bg-white rounded-lg border border-gray-200">
                            <button onclick="changeBuyQty(${idx}, -1)" class="px-2 py-1 text-indigo-600 font-black">-</button>
                            <span class="px-2 text-sm font-bold">${item.buyQty}</span>
                            <button onclick="changeBuyQty(${idx}, 1)" class="px-2 py-1 text-indigo-600 font-black">+</button>
                        </div>
                        <p class="font-black text-indigo-700 text-sm">₱${subtotal.toFixed(2)}</p>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('cartTotal').innerText = total.toFixed(2);
        }

        function changeBuyQty(idx, amt) {
            const item = cart[idx];
            const invItem = inventory.find(p => p.barcode === item.barcode);
            const newQty = item.buyQty + amt;
            if(newQty <= 0) cart.splice(idx, 1);
            else if(newQty <= invItem.qty) item.buyQty = newQty;
            else showToast("Stock limit reached", true);
            updateCartUI();
        }

        function processCheckout() {
            if(!cart.length) return;
            cart.forEach(c => {
                const invItem = inventory.find(p => p.barcode === c.barcode);
                if(invItem) invItem.qty -= c.buyQty;
            });
            sales.push({
                id: Date.now(), date: new Date().toISOString().split('T')[0], time: new Date().toLocaleTimeString(),
                items: [...cart], total: cart.reduce((s,i) => s + (i.price * i.buyQty), 0)
            });
            localStorage.setItem('rhz_sales', JSON.stringify(sales));
            localStorage.setItem('rhz_inv', JSON.stringify(inventory));
            cart = []; updateCartUI(); showToast("Sale Completed!");
        }

        function renderReports() {
            const date = document.getElementById('reportDate').value || new Date().toISOString().split('T')[0];
            const daily = sales.filter(s => s.date === date);
            document.getElementById('repDailyRev').innerText = daily.reduce((s,i)=>s+i.total,0).toLocaleString();
            document.getElementById('repLogs').innerHTML = daily.slice().reverse().map(s => `
                <div class="text-xs bg-white p-3 rounded-xl border border-gray-100 shadow-sm">
                    <div class="flex justify-between font-black mb-1"><span>${s.time}</span><span class="text-green-600">₱${s.total.toFixed(2)}</span></div>
                    <p class="text-[10px] text-gray-400 font-bold uppercase">${s.items.map(i=>`${i.buyQty}x ${i.name}`).join(', ')}</p>
                </div>
            `).join('') || '<p class="text-center text-gray-400 text-xs py-4">No sales recorded</p>';
        }

        function showToast(msg, err = false) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.className = `fixed top-16 left-1/2 -translate-x-1/2 px-4 py-2 rounded-full shadow-lg z-[100] text-xs font-bold text-white ${err?'bg-red-500':'bg-green-500'}`;
            t.classList.remove('hidden'); setTimeout(()=>t.classList.add('hidden'), 1500);
        }

        function exportData() {
            const csv = "Date,Time,Items,Total\n" + sales.map(s => `"${s.date}","${s.time}","${s.items.map(i=>i.name).join('|')}",${s.total}`).join("\n");
            const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
            a.download = `rhazedon_sales.csv`; a.click();
        }

        const scanner = new Html5Qrcode("reader");
        scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
            document.getElementById('manualInput').value = txt; addToCartByBarcode();
        }).catch(() => console.log("Camera access issues"));

        document.getElementById('reportDate').valueAsDate = new Date();
    </script>
</body>
</html>
